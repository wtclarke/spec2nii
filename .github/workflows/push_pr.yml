name: Run code tests on push and pull requests
on:
  push:
  pull_request:
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  tests:
    if: github.event_name == 'pull_request' || matrix.environment == 'py312'
    name: Pixi (${{ matrix.environment }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: ["ubuntu-latest"]
        environment: ["py310", "py311", "py312", "py313", "py314"]
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
          lfs: true
      - uses: prefix-dev/setup-pixi@v0.9.4
        with:
          manifest-path: pyproject.toml
          environments: ${{ matrix.environment }}
          cache: false
          activate-environment: false
      - name: Lint
        if: matrix.environment == 'py312'
        run: |
          pixi run lint
      - name: Run pytest
        run: |
          pixi run -e ${{ matrix.environment }} test
